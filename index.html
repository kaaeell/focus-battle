<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Focus Battle</title>
</head>
<body>
  <h1>Focus Battle!</h1>

  <!-- Stats bar (top right) -->
  <div id="stats-bar">
    <div class="stat" id="boss-incoming-stat" style="display:none">
      <span class="stat-label boss-warn">⚠ BOSS</span>
    </div>
    <div class="stat">
      <span class="stat-label">LVL</span>
      <span id="level">1</span>
    </div>
    <div class="stat">
      <span class="stat-label">HP</span>
      <div class="bar-track"><div class="bar-fill" id="hp-fill"></div></div>
      <span id="hp-val">100</span>
    </div>
    <div class="stat">
      <span class="stat-label">XP</span>
      <div class="bar-track"><div class="bar-fill xp" id="xp-fill"></div></div>
      <span id="xp-val">0</span>
    </div>
    <div class="stat">
      <span class="stat-label">🔥</span>
      <span id="streak-val">0</span>
    </div>
  </div>

  <!-- Active item badges -->
  <div id="active-items"></div>

  <!-- Daily challenge panel (fixed bottom-left) -->
  <div id="daily-challenge">
    <span class="dc-label">Daily</span>
    <p id="dc-desc">—</p>
    <div class="dc-bottom">
      <span id="dc-progress">0 / 1</span>
      <span id="dc-status">—</span>
    </div>
  </div>

  <!-- Duration picker -->
  <div id="duration-row">
    <button class="dur-btn active" data-min="25">25m</button>
    <button class="dur-btn" data-min="50">50m</button>
    <button class="dur-btn" data-min="90">90m</button>
  </div>

  <!-- Enemy card (hidden until session starts) -->
  <div id="enemy-card" class="hidden">
    <span id="enemy-tier-badge">Common</span>
    <p id="enemy-name">—</p>
    <div class="bar-track wide">
      <div class="bar-fill enemy" id="enemy-hp-fill"></div>
    </div>
    <span id="enemy-hp-text">—</span>
    <span id="enemy-ability-row">
      <span id="enemy-ability-label" class="ability-label">—</span>
      <span id="enemy-ability-desc" class="ability-desc">—</span>
    </span>
  </div>

  <p id="timer">25:00</p>

  <div class="btn-wrapper">
    <button id="start-btn">Start Focus</button>
    <div class="btn-shadow"></div>
  </div>

  <div class="btn-shop">
    <button id="btn-shop">Shop</button>
    <button id="btn-inv">Inventory</button>
    <button id="btn-history">History</button>
  </div>

  <button id="btn-stop">Stop</button>

  <!-- Shop modal -->
  <div id="shop-modal" class="modal-overlay hidden" role="dialog" aria-modal="true">
    <div class="modal-panel">
      <button class="modal-close" id="shop-close">✕</button>
      <h2 class="modal-title">Apothecary</h2>
      <p class="modal-subtitle">Spend your hard-earned XP</p>
      <div id="shop-items-grid"></div>
    </div>
  </div>

  <!-- Inventory modal -->
  <div id="inv-modal" class="modal-overlay hidden" role="dialog" aria-modal="true">
    <div class="modal-panel">
      <button class="modal-close" id="inv-close">✕</button>
      <h2 class="modal-title">Inventory</h2>
      <p class="modal-subtitle">Equip items before your session</p>
      <div id="inv-items-grid"></div>
    </div>
  </div>

  <!-- History modal -->
  <div id="history-modal" class="modal-overlay hidden" role="dialog" aria-modal="true">
    <div class="modal-panel">
      <button class="modal-close" id="history-close">✕</button>
      <h2 class="modal-title">History</h2>
      <p class="modal-subtitle">Your last 20 sessions</p>
      <div id="history-list"></div>
    </div>
  </div>

  <!-- Death screen -->
  <div id="death-screen" class="modal-overlay hidden" role="alert">
    <div class="modal-panel death-panel">
      <h2 class="death-title">Defeated</h2>
      <p class="death-sub">Your HP reached zero</p>
      <div class="regen-block">
        <span class="regen-label">Next HP regen in</span>
        <span id="regen-countdown">—</span>
        <span class="regen-note">+5 HP every 15 minutes — max 50</span>
      </div>
      <button id="death-shop-btn">Open Apothecary</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
